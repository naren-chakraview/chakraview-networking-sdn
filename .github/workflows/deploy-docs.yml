name: Build and Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: networking-sdn

      - name: Checkout GitHub Pages repo
        uses: actions/checkout@v4
        with:
          repository: naren-chakraview/naren-chakraview.github.io
          path: pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install mkdocs mkdocs-material pymdown-extensions

      - name: Build documentation
        working-directory: networking-sdn
        run: |
          mkdocs build --config-file mkdocs.yml --site-dir ../site

      - name: Update GitHub Pages repo
        working-directory: pages
        run: |
          # Remove old docs
          rm -rf networking-sdn/

          # Copy new built docs
          mkdir -p networking-sdn
          cp -r ../site/* networking-sdn/

          # Configure git
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Commit if changes exist
          if [ -n "$(git status --porcelain)" ]; then
            git add networking-sdn/
            git commit -m "docs: auto-deploy networking-sdn documentation from main repo"
            git push origin main
          fi
